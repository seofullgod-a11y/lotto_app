<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แผงกรอกผลสด — ตรวจหวย</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .full { grid-column:1/-1; }
    textarea.small { min-height:60px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
    #log { font-family:var(--tnum); font-size:.82rem; white-space:pre-wrap; margin-top:16px; color:var(--muted); }
    @media (max-width:560px){ .row2{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="site-head">
    <div class="wrap"><a class="brand" href="/"><span class="logo">฿</span><b>ตรวจหวย<small>แผงควบคุม</small></b></a>
      <nav class="nav"><a href="/">หน้าเว็บ</a></nav></div>
  </header>

  <main class="wrap">
    <p class="eyebrow">กรอกผลระหว่างถ่ายทอดสด</p>
    <h1 class="h-section" style="font-size:1.3rem">แผงกรอกผลสด</h1>
    <p class="note" style="margin-bottom:20px">เลือกประเภทหวย กรอกผลแล้วกด “บันทึก & รายงานสด” ผู้ชมเห็นทันที เมื่อครบกด “ประกาศผลทางการ” เพื่อส่งแจ้งเตือน</p>

    <section class="card">
      <div class="row2" style="margin-bottom:14px">
        <div class="field"><label>รหัสผ่านแอดมิน (ADMIN_TOKEN)</label><input id="token" type="password" placeholder="วางโทเคน" /></div>
        <div class="field"><label>ประเภทหวย</label><select id="lottery"></select></div>
        <div class="field"><label>วันที่งวด</label><input id="date" type="date" /></div>
      </div>

      <div id="form-government">
        <div class="row2">
          <div class="field"><label>รางวัลที่ 1 (6 หลัก)</label><input id="first" inputmode="numeric" maxlength="6" /></div>
          <div class="field"><label>เลขท้าย 2 ตัว</label><input id="back2" inputmode="numeric" maxlength="2" /></div>
          <div class="field"><label>ข้างเคียงรางวัลที่ 1</label><input id="near1" placeholder="097862 097864" /></div>
          <div class="field"><label>เลขหน้า 3 ตัว</label><input id="front3" placeholder="290 742" /></div>
          <div class="field"><label>เลขท้าย 3 ตัว</label><input id="back3" placeholder="339 881" /></div>
          <div class="field"></div>
          <div class="field full"><label>รางวัลที่ 2 (5 เลข)</label><textarea id="second" class="small"></textarea></div>
          <div class="field full"><label>รางวัลที่ 3 (10 เลข)</label><textarea id="third" class="small"></textarea></div>
          <div class="field full"><label>รางวัลที่ 4 (50 เลข)</label><textarea id="fourth" class="small"></textarea></div>
          <div class="field full"><label>รางวัลที่ 5 (100 เลข)</label><textarea id="fifth" class="small"></textarea></div>
        </div>
      </div>

      <div id="form-simple" style="display:none">
        <div class="row2">
          <div class="field"><label>3 ตัวบน</label><input id="top3" inputmode="numeric" maxlength="3" placeholder="789" /></div>
          <div class="field"><label>2 ตัวล่าง</label><input id="bottom2" inputmode="numeric" maxlength="2" placeholder="45" /></div>
        </div>
        <p class="note">2 ตัวบน คำนวณจาก 3 ตัวบนให้อัตโนมัติ</p>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="save">บันทึก &amp; รายงานสด</button>
        <button class="btn" id="publish" style="background:var(--gold);color:#3a2c00">ประกาศผลทางการ (แจ้งเตือน)</button>
        <button class="btn btn-ghost" id="sync">ดึงผลรัฐบาลจาก API</button>
        <button class="btn btn-ghost" id="sync-providers">ดึงหวยอื่นจาก Provider</button>
        <button class="btn btn-ghost" id="load">โหลดงวดนี้มาแก้</button>
      </div>
      <div id="log"></div>
    </section>

    <section class="card section-gap">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
        <h2 class="h-section" style="margin:0">สถิติการใช้งานเว็บ</h2>
        <button class="btn btn-ghost" id="load-analytics">โหลดข้อมูล</button>
      </div>
      <div id="analytics" style="margin-top:14px"><p class="note">กดปุ่มเพื่อดูยอดเข้าชมและเลขที่คนตรวจบ่อย</p></div>
    </section>
  </main>

  <script>
    const A = (id) => document.getElementById(id);
    A('load-analytics').onclick = async () => {
      const token = sessionStorage.token || A('token').value.trim();
      const box = A('analytics'); box.innerHTML = '<p class="note">กำลังโหลด…</p>';
      try {
        const r = await fetch('/api/admin/analytics', { headers: { Authorization: 'Bearer ' + token } });
        const d = await r.json(); if (!r.ok) throw new Error(d.error || r.status);
        const views = (d.topViews||[]).slice(0,12).map(v=>`<tr><td>${v.path}</td><td style="text-align:right">${v.count.toLocaleString('th-TH')}</td></tr>`).join('') || '<tr><td class="note">—</td></tr>';
        const nums = Object.entries(d.topNumbers||{}).map(([lot,arr])=>`<div style="margin-top:10px"><b style="font-family:var(--display)">${lot}</b>: ${arr.slice(0,10).map(x=>`<span style="font-family:var(--tnum);background:var(--surface-2);padding:3px 8px;border-radius:7px;margin:2px;display:inline-block">${x.number} (${x.count})</span>`).join('')}</div>`).join('') || '<p class="note">ยังไม่มีการตรวจเลข</p>';
        box.innerHTML = `<p class="note">เข้าชมรวม ${d.totalViews.toLocaleString('th-TH')} • ตรวจเลขรวม ${d.totalChecks.toLocaleString('th-TH')}</p>
          <h3 style="font-family:var(--display);font-size:1rem;margin:14px 0 6px">หน้าที่เข้าชมบ่อย</h3>
          <table style="width:100%;border-collapse:collapse"><tbody>${views}</tbody></table>
          <h3 style="font-family:var(--display);font-size:1rem;margin:16px 0 6px">เลขที่คนตรวจบ่อย</h3>${nums}`;
      } catch (e) { box.innerHTML = `<p class="note">โหลดไม่สำเร็จ: ${e.message}</p>`; }
    };
  </script>

  <script>
    const $ = (id) => document.getElementById(id);
    const log = (m) => { $('log').textContent = new Date().toLocaleTimeString('th-TH')+'  '+m+'\n'+$('log').textContent; };
    if (sessionStorage.token) $('token').value = sessionStorage.token;
    const arr = (s) => (s||'').trim().split(/[\s,]+/).filter(Boolean);
    let KIND = {};

    (async () => {
      const { all } = await (await fetch('/api/lotteries')).json();
      const sel = $('lottery');
      const { groups } = await (await fetch('/api/lotteries')).json();
      sel.innerHTML = groups.map(g=>`<optgroup label="${g.category}">${g.items.map(i=>`<option value="${i.code}">${i.name}</option>`).join('')}</optgroup>`).join('');
      all.forEach(l => KIND[l.code]=l.kind);
      sel.addEventListener('change', applyKind);
      applyKind();
    })();

    function applyKind() {
      const gov = KIND[$('lottery').value] === 'government';
      $('form-government').style.display = gov ? '' : 'none';
      $('form-simple').style.display = gov ? 'none' : '';
    }

    function collect() {
      if (KIND[$('lottery').value] === 'government') {
        return { first:$('first').value.replace(/\D/g,''), back2:$('back2').value.replace(/\D/g,''),
          near1:arr($('near1').value), front3:arr($('front3').value), back3:arr($('back3').value),
          second:arr($('second').value), third:arr($('third').value), fourth:arr($('fourth').value), fifth:arr($('fifth').value) };
      }
      return { top3:$('top3').value.replace(/\D/g,''), bottom2:$('bottom2').value.replace(/\D/g,'') };
    }
    function fill(d) {
      $('first').value=d.first||''; $('back2').value=d.back2||''; $('near1').value=(d.near1||[]).join(' ');
      $('front3').value=(d.front3||[]).join(' '); $('back3').value=(d.back3||[]).join(' ');
      $('second').value=(d.second||[]).join(' '); $('third').value=(d.third||[]).join(' ');
      $('fourth').value=(d.fourth||[]).join(' '); $('fifth').value=(d.fifth||[]).join(' ');
      $('top3').value=d.top3||''; $('bottom2').value=d.bottom2||'';
    }
    async function post(url, body) {
      const token=$('token').value.trim(); sessionStorage.token=token;
      const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)});
      const d=await r.json(); if(!r.ok) throw new Error(d.error||r.status); return d;
    }
    const lottery = () => $('lottery').value;

    $('save').onclick = async () => { const date=$('date').value; if(!date) return log('เลือกวันที่ก่อน');
      try { await post('/api/admin/draw',{lottery:lottery(),date,patch:collect(),final:false}); log('บันทึก & รายงานสดแล้ว ✓'); } catch(e){ log('ผิดพลาด: '+e.message); } };
    $('publish').onclick = async () => { const date=$('date').value; if(!date) return log('เลือกวันที่ก่อน');
      if(!confirm('ประกาศผลทางการและส่งแจ้งเตือน?')) return;
      try { await post('/api/admin/draw',{lottery:lottery(),date,patch:collect(),final:true}); log('ประกาศผล + แจ้งเตือนแล้ว ✓'); } catch(e){ log('ผิดพลาด: '+e.message); } };
    $('sync').onclick = async () => { try { const d=await post('/api/admin/sync',{}); $('lottery').value='government'; applyKind(); fill(d.draw); $('date').value=d.draw.date; log('ดึงจาก '+d.source+' สำเร็จ ✓'); } catch(e){ log('ดึงไม่สำเร็จ: '+e.message); } };
    $('sync-providers').onclick = async () => { try { const d=await post('/api/admin/sync-providers',{}); log('ดึงหวยอื่นจาก Provider: อัปเดต '+d.updated+' หวย ✓'); } catch(e){ log('ดึงไม่สำเร็จ: '+e.message); } };
    $('load').onclick = async () => { const date=$('date').value; if(!date) return log('เลือกวันที่ก่อน');
      try { const r=await fetch('/api/draw/'+date+'?lottery='+lottery()); const d=await r.json(); if(!r.ok) throw new Error(d.error); fill(d.draw); log('โหลดงวด '+date+' แล้ว'); } catch(e){ log('โหลดไม่ได้: '+e.message); } };
  </script>
</body>
</html>
