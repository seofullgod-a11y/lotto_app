<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ทำนายฝันเป็นเลข + เลขมงคลส่วนตัว | ตรวจหวย</title>
<meta name="description" content="เล่าความฝันแล้ว AI ตีความเป็นเลขตามตำราฝันไทย พร้อมเลขมงคลจากวันเกิด เพื่อความบันเทิง">
<meta name="theme-color" content="#0c8a63"><link rel="stylesheet" href="/styles.css">
<style>
.reveal{opacity:0;transform:translateY(14px);animation:rise .55s ease forwards}@keyframes rise{to{opacity:1;transform:none}}
/* mystical hero */
.dream-hero{position:relative;overflow:hidden;border-radius:22px;padding:30px 22px;text-align:center;color:#fff;background:linear-gradient(160deg,#1a2a4f,#243b6b 45%,#0c8a63);margin-bottom:22px}
.dream-hero h1{font-family:var(--display);font-size:1.6rem;font-weight:700;margin:14px 0 4px;position:relative}
.dream-hero p{opacity:.85;margin:0;font-size:.92rem;position:relative}
.orb{width:84px;height:84px;border-radius:50%;margin:0 auto;background:radial-gradient(circle at 35% 30%,#fff,#cfe9ff 30%,#7aa6e8 60%,#4a6fb5);box-shadow:0 0 36px rgba(150,190,255,.7);animation:bob 4s ease-in-out infinite;position:relative;z-index:2}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.star{position:absolute;color:#fff;opacity:.7;animation:tw 2s ease-in-out infinite}
.star:nth-child(1){top:20px;left:30px;font-size:.8rem}.star:nth-child(2){top:50px;right:40px;font-size:1.1rem;animation-delay:.5s}
.star:nth-child(3){bottom:30px;left:60px;font-size:.7rem;animation-delay:1s}.star:nth-child(4){top:30px;right:90px;font-size:.9rem;animation-delay:1.4s}
.star:nth-child(5){bottom:24px;right:30px;font-size:1rem;animation-delay:.8s}
@keyframes tw{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

.tabs{display:flex;gap:8px;margin-bottom:20px}
.tabs button{flex:1;padding:13px;border:1.5px solid var(--line);background:var(--surface);border-radius:14px;font-family:var(--display);font-weight:600;cursor:pointer;color:var(--muted);transition:.18s;font-size:1rem}
.tabs button.on{background:linear-gradient(135deg,#243b6b,#0c8a63);color:#fff;border-color:transparent;transform:translateY(-2px);box-shadow:0 6px 16px rgba(36,59,107,.3)}

.magic-btn{width:100%;background:linear-gradient(120deg,#3a5da8,#0c8a63);color:#fff;border:none;border-radius:14px;padding:16px;font-family:var(--display);font-weight:700;font-size:1.1rem;cursor:pointer;box-shadow:0 6px 18px rgba(58,93,168,.35);transition:.15s}
.magic-btn:hover{transform:translateY(-2px)}.magic-btn:active{transform:scale(.97)}.magic-btn:disabled{opacity:.6}

.num-out{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;justify-content:center}
.num-grid{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.num-card{display:block;padding:14px 16px;background:linear-gradient(135deg,#fff8e7,var(--gold-soft));border:1.5px solid var(--gold-line);border-radius:16px;text-decoration:none;color:var(--ink);opacity:0;transform:translateY(10px);animation:reveal-num .5s ease forwards;transition:transform .15s,box-shadow .15s}
.num-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.num-card:nth-child(2){animation-delay:.1s}.num-card:nth-child(3){animation-delay:.2s}.num-card:nth-child(4){animation-delay:.3s}
@keyframes reveal-num{to{opacity:1;transform:none}}
.nc-head{display:flex;align-items:center;justify-content:space-between}
.nc-n{font-family:var(--tnum);font-size:2rem;font-weight:700;color:#8a6608;letter-spacing:.08em}
.nc-arrow{font-family:var(--display);font-weight:600;font-size:.82rem;color:var(--jade-deep)}
.nc-stat{font-size:.86rem;color:var(--muted);margin-top:6px}.nc-stat b{color:var(--ink)}
.ref-note{font-size:.78rem;color:var(--muted);text-align:center;margin-top:12px;line-height:1.5}
.interp{background:var(--surface-2);border-radius:14px;padding:16px;margin-top:16px;font-size:.98rem;line-height:1.6;border-left:3px solid var(--jade)}
.loading{text-align:center;padding:20px;color:var(--muted)}
.loading .dots span{display:inline-block;animation:bounce 1.2s infinite}.loading .dots span:nth-child(2){animation-delay:.15s}.loading .dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001s!important;animation-iteration-count:1!important}.reveal,.num-out a{opacity:1;transform:none}}
</style></head><body>
<header class="site-head"><div class="wrap">
<a class="brand" href="/"><span class="logo">฿</span><b>ตรวจหวย<small>ทำนายฝัน</small></b></a>
<nav class="nav"><a href="/">ตรวจหวย</a><a href="/games">เกม</a><a href="/dream" aria-current="page">ทำนายฝัน</a></nav>
</div></header>
<main class="wrap">
<section class="dream-hero reveal">
<span class="star">⭐</span><span class="star">✨</span><span class="star">⭐</span><span class="star">✨</span><span class="star">🌟</span>
<div class="orb"></div>
<h1 id="hero-title">ทำนายฝันเป็นเลข</h1>
<p id="hero-sub">เล่าความฝัน แล้วให้เลขนำโชคปรากฏ</p>
</section>

<div class="tabs reveal"><button id="t-dream" class="on">🔮 ทำนายฝัน</button><button id="t-lucky">🎂 เลขมงคล</button></div>

<section id="panel-dream" class="reveal">
<section class="card">
<label>เล่าความฝันของคุณ</label>
<textarea id="dream" rows="3" placeholder="เช่น ฝันเห็นงูใหญ่เลื้อยเข้าบ้าน"></textarea>
<div style="margin-top:14px"><button class="magic-btn" id="dream-go">🔮 ทำนายเลขนำโชค</button></div>
<div id="dream-out"></div>
</section>
</section>

<section id="panel-lucky" class="reveal" style="display:none">
<section class="card">
<label>วันเกิดของคุณ</label>
<input id="bday" type="date">
<div style="margin-top:14px"><button class="magic-btn" id="lucky-go">🎂 คำนวณเลขมงคล</button></div>
<div id="lucky-out"></div>
</section>
</section>
<p class="note section-gap">ทั้งหมดเพื่อความบันเทิง การออกรางวัลเป็นเรื่องของความน่าจะเป็น ไม่สามารถทำนายได้จริง</p>
</main>
<footer class="site-foot"><div class="wrap"><span class="note">เพื่อความบันเทิงเท่านั้น</span></div></footer>
<script>
const $=id=>document.getElementById(id);
async function renderNumbers(host,nums){
  host.innerHTML='<div class="num-grid">'+nums.map(n=>`<a class="num-card" href="/huay/${n}"><div class="nc-head"><b class="nc-n">${n}</b><span class="nc-arrow">ดูสถิติเต็ม →</span></div><div class="nc-stat" data-n="${n}">กำลังโหลดสถิติ…</div></a>`).join('')+'</div><p class="ref-note">📊 อ้างอิงจากสถิติผลสลากกินแบ่งรัฐบาลย้อนหลังในระบบ · กดที่เลขเพื่อดูประวัติการออกเต็ม ๆ</p>';
  for(const n of nums){try{const d=await(await fetch('/api/number/'+n)).json();const el=host.querySelector(`.nc-stat[data-n="${n}"]`);if(el)el.innerHTML=d.total?`📊 เลขนี้เคยออกในผลรางวัลมาแล้ว <b>${d.total} ครั้ง</b>${d.lastThai?` · ออกล่าสุดงวด <b>${d.lastThai}</b>`:''} (จาก ${d.totalDraws} งวด)`:'ยังไม่เคยออกในสถิติย้อนหลังที่มี';}catch{}}
}
function setTab(d){const dr=d==='dream';$('t-dream').classList.toggle('on',dr);$('t-lucky').classList.toggle('on',!dr);$('panel-dream').style.display=dr?'':'none';$('panel-lucky').style.display=dr?'none':'';$('hero-title').textContent=dr?'ทำนายฝันเป็นเลข':'เลขมงคลส่วนตัว';$('hero-sub').textContent=dr?'เล่าความฝัน แล้วให้เลขนำโชคปรากฏ':'เลขนำโชคจากวันเกิดของคุณ';}
$('t-dream').onclick=()=>setTab('dream');$('t-lucky').onclick=()=>setTab('lucky');
$('dream-go').onclick=async()=>{
  const text=$('dream').value.trim();if(!text)return alert('เล่าความฝันก่อนนะ');
  $('dream-out').innerHTML='<div class="loading">🔮 กำลังเพ่งลูกแก้ว<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>';
  $('dream-go').disabled=true;
  try{const r=await fetch('/api/dream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});const d=await r.json();
    if(!r.ok){$('dream-out').innerHTML=`<p class="note">${d.error||'ทำนายไม่สำเร็จ'}</p>`;}
    else{$('dream-out').innerHTML=`<div class="interp">${d.interpretation||''}</div><div id="dream-nums"></div><p class="note" style="margin-top:10px;text-align:center">${d.note||''}</p>`;renderNumbers($('dream-nums'),d.numbers||[]);}
  }catch{$('dream-out').innerHTML='<p class="note">เกิดข้อผิดพลาด</p>';}
  $('dream-go').disabled=false;
};
function reduce2(n){let x=Math.abs(parseInt(n,10)||0);while(x>=100)x=String(x).split('').reduce((s,d)=>s+ +d,0);return String(x).padStart(2,'0');}
function dsum(n){return String(n).split('').reduce((s,x)=>s+ +x,0);}
$('lucky-go').onclick=()=>{
  const v=$('bday').value;const m=v.match(/(\d{4})-(\d{2})-(\d{2})/);if(!m)return alert('เลือกวันเกิดก่อนนะ');
  const dd=+m[3],mm=+m[2],yy=+m[1];
  const core=reduce2(dd+mm+dsum(yy)),a=String(dd).padStart(2,'0'),bb=reduce2(dd*mm),three=String((dd*100+mm*7+dsum(yy))%1000).padStart(3,'0');
  const nums=[...new Set([core,a,bb,three])];
  $('lucky-out').innerHTML=`<div class="interp">เลขมงคลของคุณจากวันเกิด — แต่ละเลขมีสถิติการออกจริงให้ดูด้วย ✨</div><div id="lucky-nums"></div>`;
  renderNumbers($('lucky-nums'),nums);
};
</script></body></html>
